name: iOS CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  xcodebuild:
    name: Build and test iOS app
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build and test
        run: |
          set -eo pipefail
          xcodebuild test \
            -project MindVault.xcodeproj \
            -scheme MindVault \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO
